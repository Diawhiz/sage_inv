<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Inventory Management{% endblock %}</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link rel="icon" type="image/png" href="/static/icons/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --primary-soft: #EEF2FF;
            --danger: #EF4444;
            --danger-dark: #DC2626;
            --danger-soft: #FEE2E2;
            --success: #10B981;
            --success-dark: #059669;
            --success-soft: #D1FAE5;
            --warning: #F59E0B;
            --bg: #F1F5F9;
            --card-bg: #ffffff;
            --text: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --nav-height: 62px;
            --radius: 0.85rem;
            --shadow: 0 1px 3px rgba(15,23,42,0.06), 0 8px 24px rgba(15,23,42,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.25rem;
            height: var(--nav-height);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1240px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo-mark {
            width: 32px; height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            display: grid;
            place-items: center;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(79,70,229,0.35);
        }
        .logo-text {
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        /* Desktop nav links */
        .nav-links {
            display: flex;
            gap: 0.15rem;
            align-items: center;
            margin-left: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.45rem 0.8rem;
            border-radius: 0.55rem;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .nav-links a:hover { color: var(--primary); background: var(--primary-soft); }
        .nav-links a.active { color: var(--primary); background: var(--primary-soft); }

        .location-filter {
            padding: 0.4rem 0.6rem;
            border-radius: 0.55rem;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            font-family: 'DM Sans', sans-serif;
            background: white;
            color: var(--text);
            cursor: pointer;
            max-width: 160px;
        }

        /* User chip */
        .user-chip {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.3rem 0.3rem 0.3rem 0.65rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: white;
        }
        .user-meta { display: flex; flex-direction: column; line-height: 1.15; }
        .user-name { font-size: 0.8rem; font-weight: 600; color: var(--text); }
        .user-role-text { font-size: 0.68rem; color: var(--text-muted); }
        .avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            color: white;
            display: grid;
            place-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .icon-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--danger-soft);
            color: var(--danger);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 0.9rem;
            transition: background 0.15s;
        }
        .icon-btn:hover { background: #FECACA; }

        /* Role badge */
        .role-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-size: 0.66rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .role-badge.tier-exec    { background: #EDE9FE; color: #6D28D9; }
        .role-badge.tier-manager { background: #CCFBF1; color: #0F766E; }
        .role-badge.tier-agent   { background: #FEF3C7; color: #B45309; }
        .role-badge.tier-staff   { background: #E2E8F0; color: #475569; }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            border: none;
            background: none;
        }
        .hamburger span {
            display: block;
            width: 22px; height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* Mobile drawer */
        .mobile-menu {
            display: none;
            position: fixed;
            top: var(--nav-height);
            left: 0; right: 0;
            background: white;
            box-shadow: 0 12px 28px rgba(15,23,42,0.14);
            border-bottom: 1px solid var(--border);
            z-index: 999;
            padding: 1rem;
            flex-direction: column;
            gap: 0.2rem;
        }
        .mobile-menu.open { display: flex; }
        .mobile-user {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.5rem 0.75rem 0.9rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }
        .mobile-menu a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.7rem 0.85rem;
            border-radius: 0.6rem;
            transition: background 0.15s;
        }
        .mobile-menu a:hover { background: var(--bg); }
        .mobile-menu a.active { background: var(--primary-soft); color: var(--primary); }
        .mobile-menu .logout-mobile {
            background: var(--danger-soft);
            color: var(--danger);
            margin-top: 0.5rem;
            font-weight: 600;
        }
        .mobile-menu .logout-mobile:hover { background: #FECACA; }

        /* ── LAYOUT ── */
        .container {
            max-width: 1240px;
            margin: 1.75rem auto;
            padding: 0 1.25rem;
        }

        /* ── CARDS ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* ── BUTTONS ── (base first, variants override) */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem 0.95rem;
            border: none;
            border-radius: 0.55rem;
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s;
            white-space: nowrap;
            background: #F1F5F9;
            color: var(--text);
        }
        .btn:hover { background: #E2E8F0; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: var(--success-dark); }

        /* ── TABLES ── */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        th {
            background: #F8FAFC;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #F8FAFC; }

        @media (max-width: 480px) {
            table { min-width: 100%; }
            th { display: none; }
            td {
                display: flex;
                padding: 0.5rem 0.75rem;
                border-bottom: none;
                font-size: 0.875rem;
            }
            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--text-muted);
                min-width: 110px;
                font-size: 0.72rem;
                text-transform: uppercase;
            }
            tr {
                display: block;
                border: 1px solid var(--border);
                border-radius: 0.75rem;
                margin-bottom: 0.75rem;
                padding: 0.5rem 0;
                background: white;
            }
            tbody tr:hover { background: #F8FAFC; }
        }

        /* ── FORMS ── */
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 0.55rem;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
            background: white;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
        }

        /* ── MODALS ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
            padding: 0;
        }
        @media (min-width: 600px) {
            .modal { align-items: center; padding: 1rem; }
        }
        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 1.25rem 1.25rem 0 0;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        @media (min-width: 600px) {
            .modal-content { border-radius: 1.25rem; max-width: 480px; width: 100%; }
        }
        .modal-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--text);
        }
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }
        .modal-actions .btn { flex: 1; justify-content: center; }

        /* ── ALERTS ── */
        .alert { padding: 0.875rem 1rem; border-radius: 0.625rem; margin-bottom: 1rem; font-size: 0.875rem; }
        .alert-success { background: var(--success-soft); color: #065F46; }
        .alert-error { background: var(--danger-soft); color: #991B1B; }

        /* ── PAGE HEADER ── */
        .page-title {
            color: var(--text);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            letter-spacing: -0.02em;
        }
        .page-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: -0.9rem; margin-bottom: 1.5rem; }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            align-items: center;
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }
        .stat-icon {
            width: 42px; height: 42px;
            border-radius: 0.65rem;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
            background: var(--primary-soft);
            flex-shrink: 0;
        }
        .stat-card .stat-value {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
            font-family: 'DM Mono', monospace;
        }
        .stat-card .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        /* ── QUICK ACTIONS ── */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .quick-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        }
        .quick-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(79,70,229,0.15);
        }
        .quick-card .qc-icon { font-size: 1.5rem; }
        .quick-card .qc-title { font-weight: 600; font-size: 0.95rem; }
        .quick-card .qc-desc { font-size: 0.8rem; color: var(--text-muted); }

        /* ── EMPTY / MUTED ── */
        .muted { color: var(--text-muted); }

        /* ── RESPONSIVE ── */
        @media (max-width: 860px) {
            .nav-links, .user-chip > .user-meta, .navbar .icon-btn { display: none; }
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .container { padding: 0 0.95rem; margin: 1.1rem auto; }
            .card { padding: 1.1rem; }
            .page-title { font-size: 1.3rem; }
        }
        @media (max-width: 400px) {
            .card { padding: 0.95rem; }
            .btn { font-size: 0.78rem; padding: 0.45rem 0.75rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% block navbar %}
    <nav class="navbar" id="navbar" style="display: none;">
        <div class="nav-container">
            <a href="/dashboard/" class="logo">
                <span class="logo-mark">📦</span>
                <span class="logo-text">inventory</span>
            </a>

            <!-- Desktop links -->
            <div class="nav-links">
                <a href="/dashboard/">Dashboard</a>
                <a href="/vendors/" id="navVendors">Vendors</a>
                <a href="/products/" id="navProducts">Products</a>
                <a href="/stock/" id="navStock">Stock</a>
                <a href="/report/" id="navReport">Report</a>
                <select id="locationFilter" class="location-filter" style="display:none;">
                    <option value="">All Locations</option>
                </select>
                <div class="user-chip" title="Signed in">
                    <div class="user-meta">
                        <span class="user-name" id="chipName">—</span>
                        <span class="user-role-text" id="chipRole">—</span>
                    </div>
                    <div class="avatar" id="chipAvatar">–</div>
                </div>
                <button class="icon-btn" onclick="logout()" title="Log out" aria-label="Log out">⏻</button>
            </div>

            <!-- Hamburger -->
            <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile drawer -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-user">
            <div class="avatar" id="mChipAvatar">–</div>
            <div class="user-meta">
                <span class="user-name" id="mChipName">—</span>
                <span class="role-badge" id="mChipBadge">—</span>
            </div>
        </div>
        <a href="/dashboard/" onclick="closeMenu()">📊 Dashboard</a>
        <a href="/vendors/" id="mobileVendors" onclick="closeMenu()">🏪 Vendors</a>
        <a href="/products/" id="mobileProducts" onclick="closeMenu()">📦 Products</a>
        <a href="/stock/" id="mobileStock" onclick="closeMenu()">🗃️ Stock</a>
        <a href="/report/" id="mobileReport" onclick="closeMenu()">📋 Report</a>
        <a href="#" onclick="logout()" class="logout-mobile">🚪 Logout</a>
    </div>
    {% endblock %}

    <script>
        const token = localStorage.getItem('auth_token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const userRole = localStorage.getItem('user_role') || 'staff';
        const hasLocationAccess = localStorage.getItem('has_location_access') === '1';
        const canAccessOperations = localStorage.getItem('can_access_operations') === '1';
        const canAccessCalculations = localStorage.getItem('can_access_calculations') === '1';
        const canViewStock = localStorage.getItem('can_view_stock') === '1';

        const publicPaths = ['/', '/login/'];
        if (!token && !publicPaths.includes(window.location.pathname)) {
            window.location.href = '/';
        }

        // Role-based page guards
        const path = window.location.pathname;
        if ((path.includes('/vendors/') || path.includes('/products/')) && !canAccessOperations) {
            window.location.href = '/dashboard/';
        }
        if (path.includes('/stock/') && !canViewStock) {
            window.location.href = '/dashboard/';
        }
        if (path.includes('/report/') && !canAccessCalculations) {
            window.location.href = '/dashboard/';
        }

        // Show/hide nav items based on role
        function setNavVisibility(id, visible) {
            const el = document.getElementById(id);
            if (el) el.style.display = visible ? '' : 'none';
        }

        setNavVisibility('navVendors', canAccessOperations);
        setNavVisibility('navProducts', canAccessOperations);
        setNavVisibility('navStock', canViewStock);
        setNavVisibility('navReport', canAccessCalculations);
        setNavVisibility('mobileVendors', canAccessOperations);
        setNavVisibility('mobileProducts', canAccessOperations);
        setNavVisibility('mobileStock', canViewStock);
        setNavVisibility('mobileReport', canAccessCalculations);

        // ── User identity chip + role badge ──
        function roleTier(role) {
            if (['ceo', 'coo', 'cto', 'cfo'].includes(role)) return 'tier-exec';
            if (['regional_manager', 'manager'].includes(role)) return 'tier-manager';
            if (role === 'agent') return 'tier-agent';
            return 'tier-staff';
        }
        function initialsOf(name) {
            if (!name) return '?';
            const parts = name.trim().split(/[\s._-]+/).filter(Boolean);
            return ((parts[0] || '')[0] + (parts[1] || '')[0] || parts[0][0] || '?').toUpperCase();
        }
        function scopeText() {
            if (hasLocationAccess) return 'All locations';
            if (user.region_name) return user.region_name + ' region';
            if (user.location_name) return user.location_name;
            return '';
        }
        function renderIdentity() {
            if (!token) return;
            const name = user.username || 'User';
            const roleLabel = user.role_display || userRole;
            const tier = roleTier(userRole);
            const initials = initialsOf(name);
            const scope = scopeText();

            const set = (id, fn) => { const el = document.getElementById(id); if (el) fn(el); };
            set('chipName', el => el.textContent = name);
            set('chipRole', el => el.textContent = scope ? `${roleLabel} · ${scope}` : roleLabel);
            set('chipAvatar', el => el.textContent = initials);
            set('mChipName', el => el.textContent = name);
            set('mChipAvatar', el => el.textContent = initials);
            set('mChipBadge', el => { el.textContent = roleLabel; el.className = 'role-badge ' + tier; });
        }
        renderIdentity();

        // Location filter for multi-location users
        async function loadLocationFilter() {
            if (!hasLocationAccess) return;
            const select = document.getElementById('locationFilter');
            if (!select) return;
            try {
                const r = await apiRequest('/api/locations/');
                const locations = await r.json();
                select.innerHTML = '<option value="">All Locations</option>' +
                    locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
                select.style.display = 'inline-block';
                const saved = localStorage.getItem('selected_location');
                if (saved) select.value = saved;
                select.addEventListener('change', () => {
                    localStorage.setItem('selected_location', select.value);
                    window.location.reload();
                });
            } catch(e) { console.error('Failed to load locations', e); }
        }

        // Highlight active nav link
        document.querySelectorAll('.nav-links a, .mobile-menu a').forEach(a => {
            if (a.href && a.getAttribute('href') !== '#' &&
                window.location.pathname.startsWith(new URL(a.href, location.origin).pathname)) {
                a.classList.add('active');
            }
        });

        const navbar = document.getElementById('navbar');
        if (navbar && token) navbar.style.display = 'flex';

        function logout() {
            ['auth_token','user','user_role','user_location','has_location_access',
             'can_access_operations','can_access_calculations','can_view_stock',
             'selected_location'].forEach(k => localStorage.removeItem(k));
            window.location.href = '/';
        }

        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('open');
            document.getElementById('hamburger').classList.toggle('open');
        }
        function closeMenu() {
            document.getElementById('mobileMenu').classList.remove('open');
            document.getElementById('hamburger').classList.remove('open');
        }

        // Close mobile menu on outside click
        document.addEventListener('click', e => {
            const menu = document.getElementById('mobileMenu');
            const btn = document.getElementById('hamburger');
            if (menu && btn && menu.classList.contains('open') &&
                !menu.contains(e.target) && !btn.contains(e.target)) {
                closeMenu();
            }
        });

        const API_BASE_URL = '';  // same-origin: the API is served by this Django app

        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem('auth_token');
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Token ${token}`,
                ...(options.headers || {})
            };
            const selectedLocation = localStorage.getItem('selected_location');
            let fullUrl = `${API_BASE_URL}${url}`;
            if (selectedLocation && !url.includes('?')) {
                fullUrl += `?location=${selectedLocation}`;
            } else if (selectedLocation) {
                fullUrl += `&location=${selectedLocation}`;
            }
            const response = await fetch(fullUrl, { ...options, headers });
            if (response.status === 401) { logout(); throw new Error('Unauthorized'); }
            if (response.status === 403) {
                alert('You do not have permission to access this resource.');
                throw new Error('Forbidden');
            }
            return response;
        }

        if (token) loadLocationFilter();

        // ── Real-time report stream (WebSocket) ──
        function connectReportSocket() {
            if (!token) return;
            const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${scheme}://${window.location.host}/ws/reports/?token=${token}`);
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    window.dispatchEvent(new CustomEvent('report-update', { detail: data }));
                } catch (err) { console.error('Bad WS message', err); }
            };
            ws.onclose = () => setTimeout(connectReportSocket, 3000);  // auto-reconnect
            ws.onerror = () => ws.close();
            window.reportSocket = ws;
        }
        if (token) connectReportSocket();
    </script>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/service-worker.js')
                    .then(r => console.log('SW:', r.scope))
                    .catch(e => console.log('SW fail:', e));
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
