{% extends 'base.html' %}
{% block title %}Vendors{% endblock %}
{% block content %}
<h1 class="page-title">Vendors</h1>

<div class="card">
    <div class="toolbar">
        <button class="btn btn-primary" onclick="openModal()">+ Add Vendor</button>
    </div>
    <div class="table-wrapper" id="vendorsTable"></div>
</div>

<div id="vendorModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Vendor</h3>
        <form id="vendorForm">
            <div class="form-group"><label>Name</label><input type="text" id="vendorName" required></div>
            <div class="form-group"><label>Contact</label><input type="text" id="vendorContact" required></div>
            <div class="form-group"><label>Address</label><textarea id="vendorAddress" rows="3" required></textarea></div>
            <input type="hidden" id="vendorId">
            <div class="modal-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
let editingId = null;

async function loadVendors() {
    try {
        const response = await apiRequest('/api/vendors/');
        if (!response.ok) throw new Error('Failed to load vendors');
        const vendors = await response.json();
        if (!vendors.length) { document.getElementById('vendorsTable').innerHTML = '<p style="color:#6B7280;padding:1rem 0">No vendors yet. Add one above.</p>'; return; }
        document.getElementById('vendorsTable').innerHTML = `
            <table>
                <thead><tr><th>Name</th><th>Contact</th><th>Address</th><th>Actions</th></tr></thead>
                <tbody>${vendors.map(v => `
                    <tr>
                        <td data-label="Name">${v.name}</td>
                        <td data-label="Contact">${v.contact}</td>
                        <td data-label="Address">${v.address}</td>
                        <td data-label="Actions" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                            <button class="btn btn-primary" onclick="editVendor(${v.id})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteVendor(${v.id})">Delete</button>
                        </td>
                    </tr>`).join('')}
                </tbody>
            </table>`;
    } catch(e) { document.getElementById('vendorsTable').innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
}

function openModal() { editingId=null; document.getElementById('modalTitle').textContent='Add Vendor'; document.getElementById('vendorForm').reset(); document.getElementById('vendorModal').style.display='flex'; }
function closeModal() { document.getElementById('vendorModal').style.display='none'; }

async function editVendor(id) {
    try {
        const v = await (await apiRequest(`/api/vendors/${id}/`)).json();
        editingId=id;
        document.getElementById('modalTitle').textContent='Edit Vendor';
        document.getElementById('vendorName').value=v.name;
        document.getElementById('vendorContact').value=v.contact;
        document.getElementById('vendorAddress').value=v.address;
        document.getElementById('vendorModal').style.display='flex';
    } catch(e) { alert(e.message); }
}

async function deleteVendor(id) {
    if (!confirm('Delete this vendor?')) return;
    try { await apiRequest(`/api/vendors/${id}/`,{method:'DELETE'}); loadVendors(); }
    catch(e) { alert(e.message); }
}

document.getElementById('vendorForm').addEventListener('submit', async e => {
    e.preventDefault();
    const data = { name: document.getElementById('vendorName').value, contact: document.getElementById('vendorContact').value, address: document.getElementById('vendorAddress').value };
    try {
        const r = await apiRequest(editingId?`/api/vendors/${editingId}/`:'/api/vendors/', {method:editingId?'PUT':'POST',body:JSON.stringify(data)});
        if (!r.ok) throw new Error(JSON.stringify(await r.json()));
        closeModal(); loadVendors();
    } catch(e) { alert(e.message); }
});

loadVendors();
</script>
{% endblock %}
