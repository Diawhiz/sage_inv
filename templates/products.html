{% extends 'base.html' %}
{% block title %}Products{% endblock %}
{% block content %}
<h1 class="page-title">Products</h1>

<div class="card">
    <div class="toolbar">
        <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
    </div>
    <div class="table-wrapper" id="productsTable"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Product</h3>
        <form id="productForm">
            <div class="form-group"><label>Name</label><input type="text" id="productName" required></div>
            <div class="form-group"><label>Description</label><textarea id="productDescription" rows="3" required></textarea></div>
            <div class="form-group"><label>Vendor</label><select id="productVendor" required></select></div>
            <input type="hidden" id="productId">
            <div class="modal-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
let editingId = null;

async function loadVendors() {
    try {
        const vendors = await (await apiRequest('/api/vendors/')).json();
        document.getElementById('productVendor').innerHTML = vendors.length
            ? vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('')
            : '<option disabled>No vendors available</option>';
    } catch(e) { alert(e.message); }
}

async function loadProducts() {
    try {
        const products = await (await apiRequest('/api/products/')).json();
        if (!products.length) { document.getElementById('productsTable').innerHTML='<p style="color:#6B7280;padding:1rem 0">No products yet.</p>'; return; }
        document.getElementById('productsTable').innerHTML = `
            <table>
                <thead><tr><th>Name</th><th>Description</th><th>Vendor</th><th>Actions</th></tr></thead>
                <tbody>${products.map(p=>`
                    <tr>
                        <td data-label="Name">${p.name}</td>
                        <td data-label="Description">${p.description}</td>
                        <td data-label="Vendor">${p.vendor_name}</td>
                        <td data-label="Actions" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                            <button class="btn btn-primary" onclick="editProduct(${p.id})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                        </td>
                    </tr>`).join('')}
                </tbody>
            </table>`;
    } catch(e) { document.getElementById('productsTable').innerHTML=`<div class="alert alert-error">${e.message}</div>`; }
}

function openModal() { editingId=null; document.getElementById('modalTitle').textContent='Add Product'; document.getElementById('productForm').reset(); document.getElementById('productModal').style.display='flex'; }
function closeModal() { document.getElementById('productModal').style.display='none'; }

async function editProduct(id) {
    try {
        const p = await (await apiRequest(`/api/products/${id}/`)).json();
        editingId=id;
        document.getElementById('modalTitle').textContent='Edit Product';
        document.getElementById('productName').value=p.name;
        document.getElementById('productDescription').value=p.description;
        document.getElementById('productVendor').value=p.vendor;
        document.getElementById('productModal').style.display='flex';
    } catch(e) { alert(e.message); }
}

async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try { await apiRequest(`/api/products/${id}/`,{method:'DELETE'}); loadProducts(); }
    catch(e) { alert(e.message); }
}

document.getElementById('productForm').addEventListener('submit', async e => {
    e.preventDefault();
    const data = { name: document.getElementById('productName').value, description: document.getElementById('productDescription').value, vendor: parseInt(document.getElementById('productVendor').value) };
    try {
        const r = await apiRequest(editingId?`/api/products/${editingId}/`:'/api/products/', {method:editingId?'PUT':'POST',body:JSON.stringify(data)});
        if (!r.ok) throw new Error(JSON.stringify(await r.json()));
        closeModal(); loadProducts();
    } catch(e) { alert(e.message); }
});

loadVendors(); loadProducts();
</script>
{% endblock %}
